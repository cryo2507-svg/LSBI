databases:
  - name: lsbi-db
    databaseName: lsbi
    user: lsbi_user
    plan: free

services:
  - type: web
    name: lsbi-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt psycopg2-binary
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lsbi-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: lsbi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://lsbi-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
